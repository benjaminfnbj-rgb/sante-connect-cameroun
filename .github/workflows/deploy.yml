name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Vercel CLI
        run: npm install -g vercel
      
      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=team_QfoO3RD0D3Zp7CPpqFEys4cR
        env:
          VERCEL_ORG_ID: team_QfoO3RD0D3Zp7CPpqFEys4cR
          VERCEL_PROJECT_ID: prj_nWMjb9bgbwkJmlilzVgSVtAKBU3s
